name: Release binaries

# Builds the `codedesign` CLI for five target triples on tag push and
# attaches every binary to the corresponding GitHub Release. The npm
# wrapper (`@wz927/codedesign`) consumes these artifacts at install time
# via `bin/codedesign.js`, so the file names here are load-bearing.
#
# Triples:
#   - codedesign-linux-x64       x86_64-unknown-linux-gnu
#   - codedesign-linux-arm64     aarch64-unknown-linux-gnu (cross-compiled)
#   - codedesign-darwin-x64      x86_64-apple-darwin
#   - codedesign-darwin-arm64    aarch64-apple-darwin
#   - codedesign-windows-x64.exe x86_64-pc-windows-msvc

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codedesign-linux-x64
            cross: false
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: codedesign-linux-arm64
            cross: true
          - name: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: codedesign-darwin-x64
            cross: false
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: codedesign-darwin-arm64
            cross: false
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: codedesign-windows-x64.exe
            cross: false
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: ${{ matrix.target }}

      - name: Install aarch64 linker (linux-arm64 cross)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cargo for cross linker
        if: matrix.cross
        shell: bash
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary
        shell: bash
        run: cargo build --release -p cd-cli --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/codedesign.exe" "dist/${{ matrix.artifact }}"
          else
            cp "target/${{ matrix.target }}/release/codedesign" "dist/${{ matrix.artifact }}"
            chmod +x "dist/${{ matrix.artifact }}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/dist/${{ matrix.artifact }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rust/dist/${{ matrix.artifact }}
          fail_on_unmatched_files: true

  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm/codedesign/binaries
          merge-multiple: true

      - name: List downloaded binaries
        run: ls -lh npm/codedesign/binaries

      - name: Align package.json version with tag
        shell: bash
        working-directory: npm/codedesign
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          node -e "const p=require('./package.json');p.version='${TAG}';require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"
          cat package.json

      - name: Publish to npm
        if: env.HAS_NPM_TOKEN == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --access public
        working-directory: npm/codedesign
